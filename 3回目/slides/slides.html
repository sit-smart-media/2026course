<header>課題解決実習 / 3回目：ASR + LLM で音声認識精度を上げる</header>
<h2 id="asr--automatic-speech-recognition">ASR = Automatic Speech Recognition</h2>
<p>音声を <strong>テキストに変換する</strong> 技術。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>音声波形 → 特徴量抽出 → 音響モデル → 言語モデル → テキスト
        (MFCC/mel)   (AM)         (LM)
</code></pre>
<ul>
<li>古典：HMM + GMM → DNN-HMM</li>
<li>現代：End-to-End（CTC / Attention / Transducer）</li>
<li>2022〜：大規模事前学習モデル（Whisper 等）</li>
</ul>
<footer>湘南工科大学</footer>
</section>

<h2 id="whisperopenai-2022">Whisper（OpenAI, 2022）</h2>
<ul>
<li>Encoder–Decoder <strong>Transformer</strong></li>
<li>680,000 時間の多言語データで学習</li>
<li>強み：多言語・頑健性・句読点付き</li>
<li>弱み：<strong>無音から単語を生成する</strong>（hallucination）</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>音声 → log-Mel スペクトログラム
     → Encoder → Decoder（自己回帰） → テキスト
</code></pre>
<footer>湘南工科大学</footer>

<h2 id="whisperx2023%E3%80%9C">WhisperX（2023〜）</h2>
<p>Whisper に <strong>word-level alignment</strong> を後付け。</p>
<table>
<thead>
<tr>
<th>機能</th>
<th>提供</th>
</tr>
</thead>
<tbody>

<td>文字起こし</td>
<td>Whisper</td>
</tr>
<tr>
<td>単語単位タイムスタンプ</td>

</tr>
<tr>
<td>話者分離</td>
<td>pyannote</td>
</tr>
</tbody>
</table>
<p>→ <strong>「この単語が、いつ、どこに対応するか」が正確に分かる</strong></p>

<p><strong>強み</strong></p>
<ul>
<li>単語単位の時刻が取れる</li>
<li>話者切り替えが追える</li>
<li>バッチ処理が速い</li>
</ul>
<p><strong>限界</strong></p>
<ul>
<li>「音声的にあり得ない単語」のスコアを返さない</li>
<li>Whisper 由来の hallucination は止められない
<ul>
<li>→ 別の検証器（例：CTC-ASR）が必要</li>
</ul>
</li>
</ul>

<header>課題解決実習 / 3回目：ASR + LLM で音声認識精度を上げる</header>
<h2 id="llm-%E3%81%AF%E4%BD%95%E3%82%92%E6%9C%80%E5%A4%A7%E5%8C%96%E3%81%97%E3%81%A6%E3%81%84%E3%82%8B%E3%81%8B">LLM は何を最大化しているか</h2>
<p>真実ではなく <strong>尤度</strong>。</p>
<blockquote>
<p>「入力が正しいと仮定して、もっとも自然に続きそうなトークン列」を出す。</p>
</blockquote>
<p>ASR 誤りが混ざった入力を渡すと：</p>
<ul>
<li>それらしく <strong>補完</strong> してしまう</li>
<li>音声にない単語を <strong>追加</strong> してしまう</li>
<li>正しい部分まで <strong>書き換える</strong></li>
</ul>
<footer>湘南工科大学</footer>
</section>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code>音声（曖昧）→ ASR（誤り）→ LLM（補完）→ 出力（一見きれい）
</code></pre>
<p><strong>2段階の不確実性が累積</strong>：</p>
<ol>
<li>ASR の誤り（雑音・分布外音声・句切り）</li>
<li>LLM の幻覚（確信を持った嘘）</li>
</ol>
<p>→ WER は小さくても、意味が反転することがある。</p>

<h2 id="verification-loop-%E3%81%AE%E5%9F%BA%E6%9C%AC%E5%BD%A2">Verification Loop の基本形</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>     Audio
       ↓
  [ ASR / WhisperX ]
       ↓
  [ Error Detection ]   ← 低 confidence 箇所
       ↓
  [ LLM （局所修正のみ）]
       ↓
  [ WhisperX 再 alignment ]
       ↓
   ok → finalize
  ng → reject / retry
</code></pre>
<footer>湘南工科大学</footer>

<header>課題解決実習 / 3回目：ASR + LLM で音声認識精度を上げる</header>
<h2 id="%E5%AE%9F%E8%B7%B5%E3%81%A7%E8%A6%B3%E5%AF%9F%E3%81%99%E3%81%B9%E3%81%8D%E7%82%B9">実践で観察すべき点</h2>
<ol>
<li><strong>WhisperX の word-level タイムスタンプ</strong> の中身を見る</li>
<li><strong>生ログと LLM 補正後</strong> の diff を取る</li>
<li>LLM が <strong>何を足したか</strong> を確認する</li>
<li>その追加は <strong>音声に存在していたか</strong> を自分の耳で確認する</li>
</ol>
<p>→ これで「LLM は嘘をつく」ことを <strong>体感</strong> する。</p>
<h2 id="%E3%82%BB%E3%83%AB%E3%83%95190%E5%88%86-03_validationpy-%E3%81%A7-level-2">セルフ1（90分）— <code>03_validation.py</code> で Level 2</h2>
<p><strong>狙い</strong>：LLM が出した補正テキストを WhisperX alignment で再検証し、幻覚を検出する。</p>
<ol>
<li><code>02_asr_llm_corrected.txt</code> を入力に <code>03_validation.py</code> 実行</li>
<li><code>03_validation_report.json</code> を読む
<ul>
<li><code>naive_added</code> / <code>llm_added</code> / <code>alignment_of_added</code> を比較</li>
<li><strong>score 低い語 = 幻覚候補</strong> と判定</li>
</ul>
</li>
<li>元音声を聞いて疑わしい語が実在するか <strong>耳で検証</strong></li>
<li>レポート：どの語が幻覚／どの語が真の補正か、理由付きで分類</li>
</ol>
<p>→ 「LLM 出力を盲信しない検証ループ」の体得。</p>
<footer>湘南工科大学</footer>

<h2 id="%E3%82%BB%E3%83%AB%E3%83%95290%E5%88%86-04_accuracypy-%E3%81%A7-level-3">セルフ2（90分）— <code>04_accuracy.py</code> で Level 3</h2>
<p><strong>狙い</strong>：CER/WER で <strong>数字</strong> に基づき prompt を改善する。</p>
<ol>
<li><code>01_asr_raw.txt</code> を手修正 → <code>results/04_reference.txt</code>（正解作りも学び）</li>
<li>variant ループ：<code>--variant strict / with_glossary / fewshot / reflect</code>、または <code>--all</code></li>
<li><code>04_wer_log.csv</code> の <strong>CER / WER / len_ratio</strong> を比較し、効いた prompt を定量判断</li>
<li>自分で <strong>新 variant</strong> 追加（用語・few-shot 例・制約変更）→ 再測定</li>
<li>レポート：<strong>仮説 → 実験 → 結果</strong> の流れで改善理由を記述</li>
</ol>
<p><strong>共通の学び所</strong>：主観でなく CER/score で意思決定。prompt は仮説実験の単位＝変えたら必ず測る。</p>
